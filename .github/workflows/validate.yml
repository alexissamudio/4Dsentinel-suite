name: validate

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

# Least-privilege: el workflow solo valida, no publica ni escribe.
permissions:
  contents: read

jobs:
  fluency-4d:
    runs-on: ubuntu-latest
    # F18: matriz de Python para adelantarse al EOL de 3.11 (validar 3.12 y 3.13).
    # UV_PYTHON hace que uv use esa version en todo: uv run/uvx y los subprocess
    # `uv run --script` de los hooks. fail-fast:false para ver ambas si una rompe.
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]
    env:
      UV_PYTHON: ${{ matrix.python-version }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: true
      - name: Ruff (lint + format check, todo el Python)
        run: |
          uvx ruff@0.15.21 check plugins/fluency-4d/hooks/ scripts/ tests/ plugins/memory/scripts/
          uvx ruff@0.15.21 format --check plugins/fluency-4d/hooks/ scripts/ tests/ plugins/memory/scripts/
      - name: Mypy (strict, todo el Python)
        run: uvx mypy@2.3.0 plugins/fluency-4d/hooks/ scripts/ plugins/memory/scripts/
      # Coverage de scripts Y hooks. Los hooks corren por subprocess (uv run --script) y
      # pytest-cov (que instrumenta el padre) no los veria -> con FLUENCY_COV=1 el conftest
      # instrumenta el subprocess con `coverage run --parallel-mode` y el combine de pytest-cov
      # une los data files .coverage.* (ver conftest.py + pss.md sec 9). coverage==7.15.2:
      # misma version que arrastra pytest-cov==7.1.0, para que padre e hijo combinen sin
      # mismatch de schema. Report-only (sin fail_under).
      - name: Pytest (+ coverage report de scripts y hooks)
        env:
          FLUENCY_COV: "1"
        run: >
          uv run
          --with pytest==9.1.1 --with pytest-randomly==4.1.0
          --with hypothesis==6.156.6 --with pytest-cov==7.1.0 --with coverage==7.15.2
          pytest tests/ -q
          --cov=scripts --cov=plugins/memory/scripts --cov=plugins/fluency-4d/hooks
          --cov-report=term-missing
      - name: Skills bien formados (contrato fluency)
        run: uv run scripts/fluency_check_skills.py

  fluency-4d-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: true
      - name: Pytest (Windows)
        run: >
          uv run
          --with pytest==9.1.1 --with pytest-randomly==4.1.0 --with hypothesis==6.156.6
          pytest tests/ -q

  sentinel-agents:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: true
      - name: Agentes read-only y bien formados
        run: uv run scripts/check_agents.py
      - name: Skills bien formados
        run: uv run scripts/sentinel_check_skills.py
      - name: KB en blanco (guarda anti-write-back)
        run: uv run scripts/check_kb_blank.py

  suite:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0 # historia completa para el check de trailers de commit
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: true
      - name: Manifests JSON validos + sin rutas ../ (todos, DRY)
        run: uv run scripts/check_manifests.py
      - name: Versiones paraguas == subtree
        run: uv run scripts/check_suite_versions.py
      - name: ASCII puro en los .py de produccion
        run: uv run scripts/check_ascii.py
      - name: Enum de verdict de cada agente == seccion 4 del contrato
        run: uv run scripts/check_verdict_enums.py
      - name: Sin atribucion de IA en los commits
        env:
          BASE: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}
        run: uv run scripts/check_commit_trailer.py "$BASE"
      - name: metadata.version == git tag (solo en push de tag)
        if: github.ref_type == 'tag'
        run: uv run scripts/bump_suite.py --check-tag "${{ github.ref_name }}"
      - name: Bump de version en todo cambio de plugin (F17)
        env:
          BASE: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}
        run: uv run scripts/check_bump_on_change.py "$BASE"
      - name: Plugin memory bien formado
        run: uv run plugins/memory/scripts/check_commands.py
