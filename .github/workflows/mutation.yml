name: mutation (nightly)

# Mutation testing NO bloqueante (F16 de la auditoria 2026-07-15). Workflow separado en
# schedule -> nunca es un required-check de PRs. Surface = step summary + artifact, no issues
# (por eso permisos minimos contents:read). Corre solo en ubuntu (UTF-8; los hooks ya son
# ASCII -> sin conflicto cp1252 de Windows).
on:
  schedule:
    - cron: "0 6 * * *" # diario 06:00 UTC
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  mutmut:
    runs-on: ubuntu-latest
    # El runner corre tests/ completo por mutante (los tests de hooks lanzan subprocess);
    # cota dura muy por debajo del limite default de 360 min para no quemar runner-minutes.
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: true
      # mutmut 2.5.1 muta el archivo IN-PLACE en disco -> el subprocess `uv run --script` de
      # la fixture run_hook lee la version mutada, asi los hooks se mutan de verdad. mutmut 3.x
      # aisla en mutants/ y NO mutaria el fuente que el subprocess ejecuta -> por eso el pin 2.x.
      # `|| true`: nightly informativo; los mutantes sobrevivientes no ponen el job en rojo.
      # check_agents.py entra al set aunque no tuvo spot-check previo (report-only): sobrevivientes
      # ahi son aceptables.
      - name: Mutation testing (hooks + guardas de seguridad, no bloqueante)
        run: >
          uv run --with mutmut==2.5.1
          --with pytest==9.1.1 --with pytest-randomly==4.1.0 --with hypothesis==6.156.6
          mutmut run
          --paths-to-mutate "plugins/fluency-4d/hooks/,scripts/check_agents.py,scripts/check_kb_blank.py,plugins/memory/scripts/check_commands.py"
          --runner "uv run --with pytest==9.1.1 --with pytest-randomly==4.1.0 --with hypothesis==6.156.6 pytest tests/ -q -x"
          --simple-output --no-progress
          || true
      - name: Resumen de resultados al step summary
        if: always()
        run: |
          {
            echo '## Mutation testing (mutmut 2.5.1) - hooks + guardas'
            echo '```'
            uv run --with mutmut==2.5.1 mutmut results 2>&1 || echo '(sin resultados: revisar el step anterior)'
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Subir cache de mutmut como artifact
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: mutmut-results
          path: .mutmut-cache
          if-no-files-found: warn
