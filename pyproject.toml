[project]
name = "ai-fluency-4d-dev"
version = "0.0.0"
description = "Entorno de desarrollo del plugin fluency-4d (tests y lint; el plugin vive en plugins/)"
requires-python = ">=3.11"

[tool.pytest.ini_options]
testpaths = ["tests"]

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "W", "I"]
